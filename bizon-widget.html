<style>

    text-transform: uppercase;
    letter-spacing: 0.05em;

    cursor: pointer;
    box-shadow: 0 4px 24px rgba(201,168,76,0.45), 0 2px 8px rgba(0,0,0,0.3);

  #fra-modal .form_integration_block div:has(> input[type="checkbox"]) a,
  #fra-modal .form_integration_block label:has(> input[type="checkbox"]) span,

  @media (max-width: 480px) {
    #fra-btn { bottom: 16px; right: 16px; padding: 12px 18px; font-size: 13px; }
    #fra-modal { padding: 24px 20px; border-radius: 20px; }

</style>

<!-- Кнопка -->
<button id="fra-btn" onclick="fraOpen()">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 1v10M4 7l4 4 4-4"/><path d="M2 13h12"/>
  </svg>
  Купить запись · 500 ₽
</button>

<!-- Модал -->
<div id="fra-overlay" onclick="fraOutside(event)">
  <div id="fra-modal">
    <button id="fra-close" onclick="fraClose()">×</button>
    <h2>Доступ к записям</h2>
    <p>Все выступления после конференции</p>
    <div class="form_integration_block" id="fra-form"></div>
  </div>
</div>

<script>
  var fraLoaded = false;

  function fraOpen() {
    document.getElementById('fra-overlay').classList.add('fra-open');
    document.body.style.overflow = 'hidden';
    if (!fraLoaded) {
      fraLoaded = true;
      var s = document.createElement('script');
      s.src = 'https://salebot.pro/js/form_scripts.js';
      s.onload = function() {
        FormIntegration.init({
          project_id: 317313,
          guid: '4965f149cf3f331b35119e0787e32842',
          container: document.getElementById('fra-form')
        });
      };
      document.head.appendChild(s);
    }
  }

  function fraClose() {
    document.getElementById('fra-overlay').classList.remove('fra-open');
    document.body.style.overflow = '';
  }

  function fraOutside(e) {
    if (e.target === document.getElementById('fra-overlay')) fraClose();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') fraClose();
  });
</script>
